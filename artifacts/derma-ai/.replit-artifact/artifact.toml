kind = "web"
previewPath = "/"
title = "DermaAI - Skin Cancer Detection"
version = "1.0.0"
id = "artifacts/derma-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25899

[services.development]
run = "pnpm --filter @workspace/derma-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/derma-ai", "run", "build" ]
publicDir = "artifacts/derma-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25899"
BASE_PATH = "/"
